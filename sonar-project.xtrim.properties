sonar.organization=xtrim
sonar.projectKey=xtrim-sitio-publico

# Fuentes: todo el monorepo
sonar.sources=.

# Tests: marcamos los archivos de prueba para que no cuenten como source
sonar.tests=apps/backend/tests,apps/frontend/src,libs/shared-ui/src/lib
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Exclusiones de archivos no fuente
sonar.exclusions=**/node_modules/**,**/dist/**,**/.nx/**,**/.vscode/**,**/.storybook/**,**/public/**,**/*.spec.tsx,**/*.test.tsx,**/*.spec.ts,**/*.test.ts,**/vite.config.*,**/eslint.config.js,**/project.json,**/tsconfig.*,**/sst*,**/.aws/**/*,**/.idea/**/*,**/.strapi/**/*,**/.env,**/package.json,lighthouserc.js,apps/backend/config/**,apps/backend/ecosystem.config.js,apps/backend/jest.config.ts,apps/backend/src/api/email-setting/content-types/email-setting/lifecycles.ts,apps/frontend/__mocks__/fileMock.ts,apps/frontend/jest.config.js,apps/frontend/src/helpers/modal.ts,apps/frontend/src/proxy.ts,apps/frontend/jest.setup.ts,apps/frontend/next.config.ts,apps/frontend/postcss.config.mjs,apps/frontend/tailwind.config.js,apps/backend/.scripts/**,apps/frontend/.scripts/**,libs/shared-ui/.scripts/**,libs/revalidate/**,.github/**,libs/aws/**,libs/strapiSync/**

sonar.coverage.exclusions=libs/shared-ui/**/*.stories.tsx,libs/shared-ui/**/index.ts,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/tests/**,**/vite.config.*,**/style.ts,**/style.tsx,apps/backend/config/**,apps/backend/ecosystem.config.js,apps/backend/jest.config.ts,apps/backend/src/api/email-setting/content-types/email-setting/lifecycles.ts,apps/frontend/__mocks__/fileMock.ts,apps/frontend/jest.config.js,apps/frontend/src/helpers/modal.ts,apps/frontend/src/proxy.ts,apps/frontend/jest.setup.ts,apps/frontend/next.config.ts,apps/frontend/postcss.config.mjs,apps/frontend/tailwind.config.js,apps/frontend/src/lib/api/leads/assisted.ts,apps/frontend/src/components/structuredData/**,apps/frontend/src/lib/metadata/structuredData.ts,libs/shared-ui/src/lib/components/checkboxCustom/style.ts,apps/backend/.scripts/**,apps/frontend/.scripts/**,libs/shared-ui/.scripts/**,.github/**
# Reporte: lee cualquier lcov dentro de /coverage
sonar.javascript.lcov.reportPaths=coverage/**/lcov.info
