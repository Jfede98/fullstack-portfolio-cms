name: CI/CD SonarQube Coverage

on:
  push:
    branches:
      - master_dev

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master_dev

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Setup Test Dependencies
        run: bunx playwright install

      - name: Run Tests
        run: bunx nx run-many -t test --coverage

      - name: SonarCloud Scan (DT)
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_DT }}
        with:
          args: >
            -Dproject.settings=sonar-project.dt.properties

      - name: SonarCloud Scan (XTRIM)
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_XTRIM }}
        with:
          args: >
            -Dproject.settings=sonar-project.xtrim.properties
