name: Deploy NX Affected (DEV)

on:
  pull_request:
    branches:
      - release_dev/*

    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

env:
  REGION: us-east-2
  STAGE: dev
  CI: true
  SSH_SERVER_USER: ubuntu
  SSH_SERVER_HOST: ${{ secrets.SSH_SERVER }}
  SSH_PRIVATE_KEY_SSM: ${{ secrets.SSH_PRIVATE_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  affected:
    name: Detect affected projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.affected.outputs.projects }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') || 'nolock' }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get affected projects
        id: affected
        run: |
          PROJECTS=$(bunx nx show projects \
            --affected \
            --base=${{ github.event.pull_request.base.sha }} \
            --head=${{ github.event.pull_request.head.sha }} \
            --json)
          echo "Affected projects: $PROJECTS"
          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

  deploy-infrastructure:
    name: Deploy Infrastructure
    needs: affected
    runs-on: ubuntu-latest
    if: always() && contains(needs.affected.outputs.projects, 'aws')

    concurrency:
      group: aws-dev
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') || 'nolock' }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Get environments
        run: aws secretsmanager get-secret-value --secret-id stg/xtrim-sitio-publico-infra-inputs/environment --region $REGION > environment.json

      - name: Generate .env
        run: jq -r '.SecretString | fromjson | to_entries | map("\(.key)=\"\(.value)\"") | .[]' environment.json > libs/aws/.env

      - name: Deploy AWS
        run: bunx nx deploy aws -- -c env=${{ env.STAGE }}

  deploy-backend:
    name: Deploy Backend
    needs: [affected, deploy-infrastructure]
    runs-on: ubuntu-latest
    if: always() && contains(needs.affected.outputs.projects, 'backend')

    concurrency:
      group: backend-dev
      cancel-in-progress: false

    outputs:
      preview_url: ${{ steps.get_url.outputs.url }}

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') || 'nolock' }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy backend
        run: bunx nx deploy backend --parallel=1
        id: get_url
        shell: bash

  deploy-storybook-lib:
    name: Deploy Storybook Library
    needs: [affected, deploy-infrastructure]
    runs-on: ubuntu-latest
    if: always() && contains(needs.affected.outputs.projects, 'shared-ui')

    concurrency:
      group: storybook-lib-dev
      cancel-in-progress: false

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    outputs:
      preview_url: ${{ steps.get_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') || 'nolock' }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Publish Storybook library
        id: get_url
        run: |
          URL=$(bunx nx deploy shared-ui 2>&1 \
          | awk '/^[[:space:]]*url:/ {print $2}' \
          | tail -n 1)
          printf "url=%s\n" "$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    needs: [affected, deploy-infrastructure]
    runs-on: ubuntu-latest
    if: always() && contains(needs.affected.outputs.projects, 'frontend')

    concurrency:
      group: frontend-dev
      cancel-in-progress: false

    outputs:
      preview_url: ${{ steps.get_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            .nx/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') || 'nolock' }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install SST
        run: bun install -g sst@3.17.38

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy Frontend
        id: get_url
        run: |
          URL=$(bunx nx deploy frontend --verbose 2>&1 \
          | awk '/^[[:space:]]*url:/ {print $2}' \
          | tail -n 1)
          printf "url=%s\n" "$URL" > "$GITHUB_OUTPUT"

  comment-preview:
    name: Comment Preview Status
    if: always() && github.event_name == 'pull_request'
    needs:
      - affected
      - deploy-backend
      - deploy-storybook-lib
      - deploy-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "Preview Environment"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Preview Environment to stage `${{ env.STAGE }}`

            | info / project | status | preview URL |
            |--------|--------|-------------|
            | **Affected projects** | ${{ join(fromJson(needs.affected.outputs.projects), '<br>') }} | 🆗 |
            | **Latest commit** | `${{ github.sha }}` | 🆗 |
            | **Infraestructure** | ${{ needs.deploy-infrastructure.result == 'success' && '✅ Deployed' || needs.deploy-infrastructure.result == 'skipped' && '⏭️ Skipped' || needs.deploy-infrastructure.result == 'failure' && '❌ Failed' || '⏭️ Skipped'}} | 🆗 |
            | Backend | ${{ needs.deploy-backend.result == 'success' && '✅ Deployed' || '⏭️ Skipped' }} | ${{ needs.deploy-backend.outputs.preview_url && format('[Link]({0})', needs.deploy-backend.outputs.preview_url) || '-' }} |
            | Frontend | ${{ needs.deploy-frontend.result == 'success' && '✅ Deployed' || '⏭️ Skipped' }} | ${{ needs.deploy-frontend.outputs.preview_url && format('[Link]({0})', needs.deploy-frontend.outputs.preview_url) || '-' }} |
            | Storybook | ${{ needs.deploy-storybook-lib.result == 'success' && '✅ Deployed' || '⏭️ Skipped' }} | ${{ needs.deploy-storybook-lib.outputs.preview_url && format('[Link]({0})', needs.deploy-storybook-lib.outputs.preview_url) || '-' }} |
